<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>마탑 2층 길드원 위치공유</title>
  <style>
    #map-container {
      width: 800px;
    }
    .map-wrapper {
      position: relative;
      margin-bottom: 40px;
    }
    .map-wrapper img {
      width: 100%;
      display: block;
    }
    .marker {
      position: absolute;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      cursor: pointer;
    }
    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 12px;
      white-space: nowrap;
      transform: translate(-50%, -120%);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>내 지도</h1>
  <p>
    지도를 클릭하면 점이 찍히고, 점 위에 마우스를 올리면 이름이 보입니다.<br>
    PC에서는 오른쪽 클릭으로 삭제, 스마트폰에서는 점을 탭하면 말풍선으로 이름 확인 후 삭제 여부까지 선택할 수 있습니다.
  </p>

  <div id="map-container">
    <div class="map-wrapper">
      <h2>지도 1</h2>
      <img src="map1.png" alt="지도1" id="map1">
    </div>
    <div class="map-wrapper">
      <h2>지도 2</h2>
      <img src="map2.png" alt="지도2" id="map2">
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } 
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD-snYGlYajcwRDri2lsTrYB0Ta0OB3AdI",
      authDomain: "map-test-ce693.firebaseapp.com",
      databaseURL: "https://map-test-ce693-default-rtdb.firebaseio.com",
      projectId: "map-test-ce693",
      storageBucket: "map-test-ce693.appspot.com",
      messagingSenderId: "243965620518",
      appId: "1:243965620518:web:93287a31fcc30ddaad91e7",
      measurementId: "G-2P3X62D6ZC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function setupMap(mapId, dbPath) {
      const mapElement = document.getElementById(mapId);
      const container = mapElement.parentElement;
      container.style.position = "relative"; // 좌표 기준 설정

      // 지도 클릭 → 비율로 저장
      mapElement.addEventListener("click", function(event) {
        const rect = mapElement.getBoundingClientRect();
        const xRatio = (event.clientX - rect.left) / rect.width;
        const yRatio = (event.clientY - rect.top) / rect.height;
        const name = prompt("이 위치에 표시할 이름을 입력하세요:");
        if (!name) return;
        const color = prompt("마커 색상을 입력하세요 (예: red, blue, #ff0000):") || "blue";
        push(ref(db, dbPath), { x: xRatio, y: yRatio, name, color });
      });

      // DB에서 실시간으로 마커 불러오기
      onChildAdded(ref(db, dbPath), (snapshot) => {
        const data = snapshot.val();
        const marker = document.createElement("div");
        marker.className = "marker";

        // 이미지 크기를 기준으로 좌표 계산
        const xPos = data.x * mapElement.offsetWidth;
        const yPos = data.y * mapElement.offsetHeight;

        marker.style.left = (xPos - 7) + "px";
        marker.style.top  = (yPos - 7) + "px";
        marker.style.background = data.color || "blue";
        marker.dataset.key = snapshot.key;

        if (!/Mobi|Android/i.test(navigator.userAgent)) {
          marker.title = data.name;
          marker.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            remove(snapshot.ref);
          });
        } else {
          marker.addEventListener("click", () => {
            const tooltip = document.createElement("div");
            tooltip.className = "tooltip";
            tooltip.textContent = data.name;
            marker.appendChild(tooltip);

            setTimeout(() => {
              if (tooltip.parentNode) marker.removeChild(tooltip);
              if (confirm(`이름: ${data.name}\n이 마커를 삭제하시겠습니까?`)) {
                remove(snapshot.ref);
              }
            }, 2000);
          });
        }

        container.appendChild(marker);
      });

      // DB에서 삭제된 마커 제거
      onChildRemoved(ref(db, dbPath), (snapshot) => {
        const key = snapshot.key;
        const marker = container.querySelector(`.marker[data-key="${key}"]`);
        if (marker) marker.remove();
      });
    }

    setupMap("map1", "markers1");
    setupMap("map2", "markers2");
  </script>
</body>
</html>
