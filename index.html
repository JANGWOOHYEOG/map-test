<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>마탑 2층 길드원 위치공유</title>
  <style>
    #map-container {
      width: 800px;
    }
    .map-wrapper {
      position: relative;
      margin-bottom: 40px;
    }
    .map-wrapper img {
      width: 100%;
    }
    .marker {
      position: absolute;
      width: 15px;
      height: 15px;
      background: blue;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>내 지도</h1>
  <p>
    지도를 클릭하면 점이 찍히고, 점 위에 마우스를 올리면 이름이 보입니다.<br>
    PC에서는 오른쪽 클릭으로 삭제, 스마트폰에서는 점을 탭하면 삭제됩니다.
  </p>

  <div id="map-container">
    <div class="map-wrapper">
      <h2>지도 1</h2>
      <img src="map.png" alt="지도1" id="map1">
    </div>
    <div class="map-wrapper">
      <h2>지도 2</h2>
      <img src="map2.png" alt="지도2" id="map2">
    </div>
  </div>

  <!-- Firebase SDK와 Realtime Database 연결 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } 
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD-snYGlYajcwRDri2lsTrYB0Ta0OB3AdI",
      authDomain: "map-test-ce693.firebaseapp.com",
      databaseURL: "https://map-test-ce693-default-rtdb.firebaseio.com",
      projectId: "map-test-ce693",
      storageBucket: "map-test-ce693.appspot.com",
      messagingSenderId: "243965620518",
      appId: "1:243965620518:web:93287a31fcc30ddaad91e7",
      measurementId: "G-2P3X62D6ZC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 지도별 독립 마커 관리 함수
    function setupMap(mapId, dbPath) {
      const mapElement = document.getElementById(mapId);
      const container = mapElement.parentElement;

      // 지도 클릭 → DB에 저장
      mapElement.addEventListener("click", function(event) {
        const rect = mapElement.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const name = prompt("이 위치에 표시할 이름을 입력하세요:");
        if (name) {
          push(ref(db, dbPath), { x, y, name });
        }
      });

      // DB에서 실시간으로 마커 불러오기
      onChildAdded(ref(db, dbPath), (snapshot) => {
        const data = snapshot.val();
        const marker = document.createElement("div");
        marker.className = "marker";
        marker.style.left = (data.x - 7) + "px";
        marker.style.top = (data.y - 7) + "px";
        marker.title = data.name;
        marker.dataset.key = snapshot.key;

        // PC: 오른쪽 클릭 시 삭제
        marker.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          remove(snapshot.ref);
        });

        // 모바일: 클릭 시 삭제
        marker.addEventListener("click", (e) => {
          if (/Mobi|Android/i.test(navigator.userAgent)) {
            remove(snapshot.ref);
          }
        });

        container.appendChild(marker);
      });

      // DB에서 삭제된 마커 제거
      onChildRemoved(ref(db, dbPath), (snapshot) => {
        const key = snapshot.key;
        const marker = container.querySelector(`.marker[data-key="${key}"]`);
        if (marker) marker.remove();
      });
    }

    // 지도별로 독립된 DB 경로 사용
    setupMap("map1", "markers1");
    setupMap("map2", "markers2");
  </script>
</body>
</html>
